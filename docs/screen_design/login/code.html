<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dog Explorer - Đăng nhập</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#0060ab",
                        "on-background": "#1a1c1c",
                        "surface-dim": "#dadada",
                        "surface-container-low": "#f3f3f3",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#a3c9ff",
                        "on-tertiary": "#ffffff",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#e8e8e8",
                        "secondary": "#0061a3",
                        "surface-bright": "#f9f9f9",
                        "on-tertiary-fixed-variant": "#743500",
                        "surface-container-highest": "#e2e2e2",
                        "surface-variant": "#e2e2e2",
                        "on-tertiary-container": "#ffffff",
                        "on-secondary-fixed-variant": "#00497d",
                        "on-primary-fixed": "#001c39",
                        "on-primary-fixed-variant": "#004883",
                        "primary-container": "#0078d4",
                        "on-primary": "#ffffff",
                        "tertiary-fixed": "#ffdbc8",
                        "surface-container-lowest": "#ffffff",
                        "background": "#f9f9f9",
                        "tertiary-container": "#bc5b00",
                        "surface": "#f9f9f9",
                        "on-secondary-container": "#003f6d",
                        "tertiary": "#974700",
                        "on-primary-container": "#ffffff",
                        "primary": "#005faa",
                        "on-surface-variant": "#404752",
                        "on-secondary-fixed": "#001d36",
                        "on-tertiary-fixed": "#311300",
                        "inverse-surface": "#2f3131",
                        "outline": "#717783",
                        "primary-fixed": "#d3e3ff",
                        "inverse-on-surface": "#f1f1f1",
                        "on-surface": "#1a1c1c",
                        "tertiary-fixed-dim": "#ffb689",
                        "secondary-fixed": "#d1e4ff",
                        "surface-container": "#eeeeee",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "outline-variant": "#c0c7d4",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#9ecaff",
                        "secondary-container": "#5badff",
                        "inverse-primary": "#a3c9ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "sidebar_width": "240px",
                        "stack_sm": "4px",
                        "control_height": "32px",
                        "stack_lg": "16px",
                        "margin_page": "24px",
                        "gutter": "16px",
                        "stack_md": "8px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg": ["28px", { "lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "label-sm": ["11px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background h-screen w-screen flex items-center justify-center font-body-lg">
<!-- Centered Login Card Container -->
<div class="bg-surface-container-lowest border border-[#d1d1d1] p-[32px] w-full max-w-[400px] flex flex-col gap-stack_lg">
<!-- Header Section -->
<div class="flex flex-col items-center gap-stack_sm text-center mb-[8px]">
<div class="flex items-center justify-center bg-surface-container-low w-[48px] h-[48px] rounded-full border border-outline-variant mb-stack_sm">
<span class="material-symbols-outlined text-[24px] text-primary" data-icon="pets">pets</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface">Đăng nhập</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Chào mừng bạn quay lại với Dog Explorer</p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-[16px]">
<!-- Username Input -->
<div class="flex flex-col gap-stack_sm">
<label class="font-label-md text-label-md text-on-surface" for="username">Tên đăng nhập</label>
<input class="h-control_height px-[8px] font-body-md text-body-md border border-[#d1d1d1] bg-surface-container-lowest text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container rounded-none" id="username" name="username" placeholder="Nhập tên đăng nhập" type="text"/>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-stack_sm">
<label class="font-label-md text-label-md text-on-surface" for="password">Mật khẩu</label>
<input class="h-control_height px-[8px] font-body-md text-body-md border border-[#d1d1d1] bg-surface-container-lowest text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container rounded-none" id="password" name="password" placeholder="Nhập mật khẩu" type="password"/>
</div>
<!-- Options Row -->
<div class="flex items-center justify-between mt-stack_sm">
<label class="flex items-center gap-[8px] cursor-pointer">
<input class="w-[16px] h-[16px] border border-[#d1d1d1] rounded-none text-primary-container focus:ring-primary-container bg-surface-container-lowest" type="checkbox"/>
<span class="font-body-md text-body-md text-on-surface">Ghi nhớ đăng nhập</span>
</label>
<a class="font-label-md text-label-md text-primary-container hover:underline" href="#">Quên mật khẩu?</a>
</div>
<!-- Login Button -->
<button class="h-control_height bg-primary-container hover:bg-primary text-on-primary font-label-lg text-label-lg border-none rounded-none mt-[8px] transition-colors duration-150 flex items-center justify-center" type="submit">
                Đăng nhập
            </button>
</form>
</div>
</body></html>
